<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Helvetica Neue',sans-serif;}
body {
    background:#f4f4f4;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}
.screen {
    position:absolute;
    width:90%;
    max-width:420px;
    text-align:center;
    transition:opacity 0.6s ease;
}
.title {
    font-size:20px;
    letter-spacing:1px;
    color:#222;
}
.slide-hint {
    margin-top:40px;
    font-size:12px;
    letter-spacing:3px;
    color:#999;
}
.hidden {
    opacity:0;
    pointer-events:none;
}
iframe {
    border-radius:12px;
    margin-top:20px;
}
</style>
</head>
<body>

<div class="screen" id="first">
    <div class="title">
        when you're going thru something
    </div>
    <div class="slide-hint">
        swipe left →
    </div>
</div>

<div class="screen hidden" id="second">
    <!-- Spotify Embed -->
    <iframe src="https://open.spotify.com/embed/track/35yw6wTQcItHtyrbCAQV9L" 
        width="300" height="80" frameborder="0" allowtransparency="true" allow="encrypted-media">
    </iframe>
</div>

<script>
let startX = 0;
let showingMessage = false;

document.addEventListener("touchstart", function(e) {
    startX = e.touches[0].clientX;
});

document.addEventListener("touchend", function(e) {
    let endX = e.changedTouches[0].clientX;
    let diff = startX - endX;

    if(diff > 50 && !showingMessage){
        document.getElementById("first").classList.add("hidden");
        document.getElementById("second").classList.remove("hidden");
        showingMessage = true;
    }
});

document.addEventListener("click", function() {
    if(showingMessage){
        document.getElementById("second").classList.add("hidden");
        document.getElementById("first").classList.remove("hidden");
        showingMessage = false;
    }
});
</script>

</body>
</html>
